<svg width="1280" height="400" viewBox="0 0 1280 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="gatekeepeer">
  <defs>
    <linearGradient id="stone" x1="0" y1="0" x2="0" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2b2c30"/>
      <stop offset="1" stop-color="#161619"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F3DC92"/>
      <stop offset="0.5" stop-color="#D7B458"/>
      <stop offset="1" stop-color="#A9842F"/>
    </linearGradient>
    <linearGradient id="redcoat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D81E37"/>
      <stop offset="1" stop-color="#A50E22"/>
    </linearGradient>
    <radialGradient id="spot" cx="0.32" cy="0.42" r="0.7">
      <stop offset="0" stop-color="#3a3b40"/>
      <stop offset="1" stop-color="#161619"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1280" height="400" fill="url(#stone)"/>
  <rect width="1280" height="400" fill="url(#spot)" opacity="0.5"/>

  <!-- stone block seams -->
  <g stroke="#000000" stroke-opacity="0.18" stroke-width="2">
    <line x1="0" y1="110" x2="1280" y2="110"/>
    <line x1="0" y1="232" x2="1280" y2="232"/>
    <line x1="0" y1="330" x2="1280" y2="330"/>
    <line x1="430" y1="0" x2="430" y2="110"/>
    <line x1="760" y1="110" x2="760" y2="232"/>
    <line x1="980" y1="232" x2="980" y2="330"/>
    <line x1="250" y1="330" x2="250" y2="400"/>
  </g>

  <!-- gate railings: spears -->
  <g>
    <!-- left pair -->
    <g transform="translate(46,0)">
      <rect x="-4" y="60" width="9" height="340" fill="#1b1b1e"/>
      <path d="M0 24 L13 64 L0 92 L-13 64 Z" fill="url(#gold)"/>
      <circle cx="0" cy="100" r="7" fill="url(#gold)"/>
    </g>
    <g transform="translate(98,0)">
      <rect x="-4" y="60" width="9" height="340" fill="#1b1b1e"/>
      <path d="M0 24 L13 64 L0 92 L-13 64 Z" fill="url(#gold)"/>
      <circle cx="0" cy="100" r="7" fill="url(#gold)"/>
    </g>
    <!-- right pair -->
    <g transform="translate(1182,0)">
      <rect x="-4" y="60" width="9" height="340" fill="#1b1b1e"/>
      <path d="M0 24 L13 64 L0 92 L-13 64 Z" fill="url(#gold)"/>
      <circle cx="0" cy="100" r="7" fill="url(#gold)"/>
    </g>
    <g transform="translate(1234,0)">
      <rect x="-4" y="60" width="9" height="340" fill="#1b1b1e"/>
      <path d="M0 24 L13 64 L0 92 L-13 64 Z" fill="url(#gold)"/>
      <circle cx="0" cy="100" r="7" fill="url(#gold)"/>
    </g>
  </g>

  <!-- guardsman -->
  <g transform="translate(212,22)">
    <!-- bearskin hat -->
    <ellipse cx="140" cy="80" rx="84" ry="66" fill="#141414"/>
    <rect x="56" y="78" width="168" height="144" rx="42" fill="#141414"/>
    <ellipse cx="108" cy="74" rx="24" ry="46" fill="#2c2c2c" opacity="0.55"/>
    <!-- face -->
    <rect x="96" y="196" width="88" height="92" rx="26" fill="#E2AB80"/>
    <!-- hat brim shadow over the eyes -->
    <rect x="96" y="196" width="88" height="30" rx="14" fill="#141414"/>
    <rect x="100" y="222" width="80" height="14" fill="#000000" opacity="0.32"/>
    <!-- mouth -->
    <line x1="128" y1="268" x2="156" y2="268" stroke="#7a3b2a" stroke-width="3" stroke-linecap="round"/>
    <!-- gold chin strap -->
    <path d="M104 232 Q140 302 184 232" stroke="url(#gold)" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- neck -->
    <rect x="126" y="280" width="28" height="24" fill="#C9885F"/>
    <!-- tunic -->
    <path d="M64 378 L104 300 L176 300 L216 378 Z" fill="url(#redcoat)"/>
    <path d="M116 300 L164 300 L156 320 L124 320 Z" fill="#141414"/>
    <!-- epaulettes -->
    <rect x="90" y="302" width="28" height="11" rx="4" fill="url(#gold)"/>
    <rect x="162" y="302" width="28" height="11" rx="4" fill="url(#gold)"/>
    <!-- buttons -->
    <g fill="url(#gold)">
      <circle cx="133" cy="324" r="4.2"/><circle cx="147" cy="324" r="4.2"/>
      <circle cx="133" cy="342" r="4.2"/><circle cx="147" cy="342" r="4.2"/>
    </g>
    <!-- belt -->
    <rect x="78" y="356" width="124" height="16" fill="#ECE6D8"/>
    <rect x="131" y="353" width="18" height="22" rx="3" fill="url(#gold)" stroke="#8a6d2a"/>
  </g>

  <!-- wordmark -->
  <g>
    <text x="520" y="196" font-family="Georgia, 'Times New Roman', serif" font-size="92" font-weight="700" fill="url(#gold)" letter-spacing="1">gatekeepeer</text>
    <rect x="523" y="224" width="640" height="3" rx="1.5" fill="url(#gold)" opacity="0.7"/>
    <text x="524" y="266" font-family="Georgia, 'Times New Roman', serif" font-size="29" fill="#DBD5C7">Авто-приём заявок в приватные Telegram-каналы</text>
    <text x="524" y="306" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="20" fill="#8E8E94" letter-spacing="3">STANDS GUARD · APPROVES INSTANTLY · STAYS SILENT</text>
  </g>
</svg>
